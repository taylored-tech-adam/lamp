<script>
async function refreshFriendlight() {
  try {
    const res = await fetch("http://12.191.8.210:5267/lamp");
    const data = await res.json();
    const level = Number(data.value || 0);

    const box = document.querySelector(".glass-box");
    if (!box) return;

    let color = "#4b5563";
    if (level === 1) color = "#22c55e";
    else if (level === 2) color = "#eab308";
    else if (level === 3) color = "#f97316";
    else if (level === 4) color = "#ef4444";

    box.style.boxShadow = `0 0 60px ${color}`;
    box.style.borderColor = color;
  } catch (e) {
    console.error("FriendLight fetch failed", e);
  }
}

refreshFriendlight();
setInterval(refreshFriendlight, 5000);
</script>
